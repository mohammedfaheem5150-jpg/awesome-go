    #    erp_no: "10103204"
    #    description: "FIXTURE, LIGHTING; TYP:OMNIDIRECTIONAL, EDGE LIGHT, ..."
    #    unit_price: 1392.46
    #    remarks: "available at ADA Warehouse"
    #  LICATC:
    #    erp_no: "..."
    #    description: "..."
    #    unit_price: 0.0
    #    remarks: ""
